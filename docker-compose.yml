version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY_TATUM=${API_KEY_TATUM}
      - CASHFREE_CLIENT_ID=${CASHFREE_CLIENT_ID}
      - CASHFREE_CLIENT_SECRET=${CASHFREE_CLIENT_SECRET}
      - HYPERVERGE_APP_ID=${HYPERVERGE_APP_ID}
      - HYPERVERGE_APP_KEY=${HYPERVERGE_APP_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - cryptosolve

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - cryptosolve

networks:
  cryptosolve:
    driver: bridge
